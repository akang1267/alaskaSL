<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALAsKA Sign Language</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: Georgia, 'Times New Roman', serif;
          background: #fff;
          color: #111;
          min-height: 100vh;
          -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

        header { margin-bottom: 40px; }
        h1 { font-size: 24px; font-weight: normal; margin-bottom: 16px; }

        nav { margin-bottom: 48px; }
        nav a {
          font-size: 14px;
          color: #111;
          text-decoration: none;
          margin-right: 20px;
          padding-bottom: 2px;
        }
        nav a:hover { border-bottom: 1px solid #111; }
        nav a.active { border-bottom: 1px solid #111; }

        h2 { font-size: 14px; font-weight: normal; color: #666; margin-bottom: 12px; }

        textarea {
          width: 100%;
          min-height: 120px;
          resize: vertical;
          border: 1px solid #ddd;
          padding: 12px;
          font: inherit;
          font-size: 15px;
          color: #111;
          background: #fff;
          outline: none;
        }
        textarea:focus { border-color: #111; }

        .controls { margin-top: 12px; }

        button {
          border: 1px solid #111;
          cursor: pointer;
          font: inherit;
          font-size: 13px;
          padding: 7px 16px;
          background: #fff;
          color: #111;
          margin-right: 6px;
        }
        button:hover { background: #111; color: #fff; }

        .examples { margin-top: 16px; font-size: 13px; color: #666; }
        .examples span { margin-right: 8px; }
        .chip {
          border: 1px solid #ddd;
          background: #fff;
          color: #111;
          padding: 4px 10px;
          font-size: 13px;
          cursor: pointer;
          margin-right: 4px;
        }
        .chip:hover { border-color: #111; }

        .output { margin-top: 48px; }

        .gloss-result {
          min-height: 60px;
          padding: 20px 0;
          border-top: 1px solid #ddd;
          border-bottom: 1px solid #ddd;
          text-align: center;
        }

        .placeholder { color: #999; font-size: 14px; font-style: italic; }

        .gloss-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
        .gloss-text { font-size: 22px; letter-spacing: 0.04em; }

        .letter-images {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 20px;
          align-items: flex-end;
        }

        .letter-card { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .letter-card img { width: 48px; height: 48px; object-fit: contain; }
        .letter-label { font-size: 11px; color: #666; }
        .space-marker { width: 12px; color: #ccc; font-size: 11px; text-align: center; align-self: center; }
        .empty-msg { color: #999; font-size: 13px; font-style: italic; }

        .error-box {
          display: none;
          color: #111;
          font-size: 13px;
          margin-top: 12px;
          padding: 8px 0;
          border-top: 1px solid #ddd;
        }

        @media (max-width: 600px) {
          .page { padding: 32px 16px 60px; }
          h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="page">
    <header>
        <h1>ALAsKA Sign Language</h1>
    </header>

    <nav>
        <a href="/" class="active">Translator</a>
        <a href="/quiz">Quiz</a>
        <a href="/recognize">Recognizer</a>
        <a href="/video">Video</a>
    </nav>

    <section>
        <h2>Enter text</h2>
        <textarea id="inputText" placeholder="How are you doing?"></textarea>

        <div class="controls">
            <button id="translateBtn">Translate</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div class="examples">
            <span>Try:</span>
            <button class="chip" data-example="Hello">Hello</button>
            <button class="chip" data-example="Thank you">Thank you</button>
            <button class="chip" data-example="How are you?">How are you?</button>
        </div>

        <div class="error-box" id="errorBox"></div>
    </section>

    <section class="output">
        <h2>ASL Translation</h2>

        <div class="gloss-result">
            <div id="outputContent" class="placeholder">Enter text and click Translate.</div>
        </div>

        <div class="letter-images" id="letterImages">
            <span class="empty-msg">Hand-sign images will appear here.</span>
        </div>
    </section>
</div>

<script>
    const inputText = document.getElementById("inputText");
    const translateBtn = document.getElementById("translateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const outputContent = document.getElementById("outputContent");
    const letterImages = document.getElementById("letterImages");
    const errorBox = document.getElementById("errorBox");
    const chips = document.querySelectorAll(".chip");

    translateBtn.addEventListener("click", async () => {
        const value = inputText.value.trim();
        if (!value) {
            outputContent.className = "placeholder";
            outputContent.textContent = "Please enter a word or sentence.";
            letterImages.innerHTML = '<span class="empty-msg">Hand-sign images will appear here.</span>';
            return;
        }

        errorBox.style.display = "none";
        outputContent.className = "placeholder";
        outputContent.textContent = "Translating...";
        translateBtn.disabled = true;

        try {
            const res = await fetch("/translate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: value })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            outputContent.innerHTML = '<div class="gloss-label">ASL Gloss</div><div class="gloss-text">' + data.gloss + '</div>';
            outputContent.className = "";

            letterImages.innerHTML = "";
            const glossWords = data.gloss.split(" ");
            glossWords.forEach((word, wi) => {
                for (const ch of word) {
                    if (/[A-Z]/i.test(ch)) {
                        const card = document.createElement("div");
                        card.className = "letter-card";
                        const letter = ch.toUpperCase();
                        card.innerHTML = '<img src="asl_alphabet_test/' + letter + '_test.jpg" alt="' + letter + '" /><span class="letter-label">' + letter + '</span>';
                        letterImages.appendChild(card);
                    }
                }
                if (wi < glossWords.length - 1) {
                    const spacer = document.createElement("div");
                    spacer.className = "space-marker";
                    spacer.textContent = "|";
                    letterImages.appendChild(spacer);
                }
            });
        } catch (err) {
            outputContent.className = "placeholder";
            outputContent.textContent = "Enter text and click Translate.";
            errorBox.textContent = err.message || "Something went wrong.";
            errorBox.style.display = "block";
        }
        translateBtn.disabled = false;
    });

    clearBtn.addEventListener("click", () => {
        inputText.value = "";
        outputContent.className = "placeholder";
        outputContent.textContent = "Enter text and click Translate.";
        letterImages.innerHTML = '<span class="empty-msg">Hand-sign images will appear here.</span>';
        errorBox.style.display = "none";
    });

    chips.forEach(chip => {
        chip.addEventListener("click", () => { inputText.value = chip.dataset.example; });
    });
</script>
</body>
</html>
