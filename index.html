<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALAsKA Sign Language</title>
    <style>
        * {
          box-sizing: border-box;
        }

        :root {
          --bg: #0f172a;
          --panel: rgba(15, 23, 42, 0.72);
          --panel-border: rgba(148, 163, 184, 0.16);
          --text: #e5eefc;
          --muted: #b2bfd6;
          --accent: #7c3aed;
          --chip: rgba(124, 58, 237, 0.15);
          --shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
        }

        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background:
            radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 28%),
            linear-gradient(180deg, #020617 0%, #0f172a 100%);
          color: var(--text);
          min-height: 100vh;
        }

        .page {
          max-width: 1100px;
          margin: 0 auto;
          padding: 32px 20px 48px;
        }

        .hero {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 24px;
          margin-bottom: 24px;
        }

        .eyebrow {
          margin: 0 0 8px;
          color: #a78bfa;
          text-transform: uppercase;
          letter-spacing: 0.12em;
          font-size: 12px;
          font-weight: bold;
        }

        h1 {
          margin: 0;
          font-size: 42px;
        }

        .subtitle {
          max-width: 700px;
          color: var(--muted);
          line-height: 1.5;
          margin-top: 10px;
        }

        .status-pill {
          padding: 10px 14px;
          border-radius: 999px;
          background: rgba(34, 197, 94, 0.15);
          color: #b7f7c9;
          border: 1px solid rgba(34, 197, 94, 0.25);
          font-size: 14px;
          white-space: nowrap;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
        }

        .panel {
          background: var(--panel);
          border: 1px solid var(--panel-border);
          border-radius: 22px;
          padding: 20px;
          box-shadow: var(--shadow);
        }

        h2 {
          margin-top: 0;
          font-size: 22px;
        }

        label {
          display: block;
          margin-bottom: 10px;
          color: var(--muted);
          font-size: 14px;
        }

        textarea {
          width: 100%;
          min-height: 180px;
          resize: vertical;
          border-radius: 16px;
          border: 1px solid rgba(148, 163, 184, 0.18);
          padding: 16px;
          font: inherit;
          color: var(--text);
          background: rgba(15, 23, 42, 0.7);
          outline: none;
        }

        textarea:focus {
          border-color: rgba(124, 58, 237, 0.75);
        }

        .controls {
          display: flex;
          gap: 10px;
          margin-top: 14px;
          flex-wrap: wrap;
        }

        button {
          border: 0;
          cursor: pointer;
          font: inherit;
          border-radius: 14px;
          padding: 11px 15px;
        }

        .primary {
          background: linear-gradient(135deg, var(--accent), #4f46e5);
          color: white;
          font-weight: bold;
        }

        .secondary {
          background: rgba(148, 163, 184, 0.14);
          color: var(--text);
        }

        .ghost {
          background: transparent;
          border: 1px solid rgba(148, 163, 184, 0.22);
          color: var(--muted);
        }

        .quick-examples {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          align-items: center;
          margin-top: 16px;
          color: var(--muted);
        }

        .chip {
          background: var(--chip);
          color: #d9cbff;
          border: 1px solid rgba(124, 58, 237, 0.25);
          padding: 8px 12px;
        }

        .output-box {
          min-height: 260px;
          border-radius: 18px;
          background: linear-gradient(180deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
          border: 1px solid rgba(148, 163, 184, 0.12);
          padding: 24px;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
        }

        .placeholder {
          color: var(--muted);
          font-size: 18px;
          line-height: 1.5;
        }

        .timeline {
          min-height: 88px;
          border-radius: 16px;
          border: 1px dashed rgba(148, 163, 184, 0.24);
          padding: 14px;
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
          margin-top: 14px;
          color: var(--muted);
        }

        .token {
          padding: 10px 12px;
          border-radius: 12px;
          background: rgba(59, 130, 246, 0.14);
          color: #cde2ff;
          border: 1px solid rgba(59, 130, 246, 0.25);
        }

        @media (max-width: 900px) {
          .grid {
            grid-template-columns: 1fr;
          }

          .hero {
            flex-direction: column;
          }

          h1 {
            font-size: 34px;
          }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="hero">
        <div>
            <p class="eyebrow">Version 1 Prototype</p>
            <h1>ALAsKA Sign Language</h1>
            <p class="subtitle">
                Enter a word or sentence to preview the interface for your AI sign language translator.
            </p>
        </div>
        <div class="status-pill">Static Demo</div>
    </header>

    <main class="grid">
        <section class="panel">
            <h2>Text Input</h2>
            <label for="inputText">Word or sentence</label>
            <textarea id="inputText" placeholder="Type something like: Hello, how are you?"></textarea>

            <div class="controls">
                <button id="translateBtn" class="primary">Generate</button>
                <button id="clearBtn" class="secondary">Clear</button>
            </div>

            <div class="quick-examples">
                <span>Try:</span>
                <button class="chip" data-example="Hello">Hello</button>
                <button class="chip" data-example="Thank you">Thank you</button>
                <button class="chip" data-example="How are you?">How are you?</button>
                <button class="chip" data-example="I need help">I need help</button>
            </div>
        </section>

        <section class="panel">
            <h2>Output Preview</h2>

            <div class="controls">
                <button class="ghost">Replay</button>
                <button class="ghost">Pause</button>
            </div>

            <div class="output-box">
                <div id="outputText" class="placeholder">
                    Animation preview will appear here later.
                </div>
            </div>

            <div id="timeline" class="timeline">
                No generated sequence yet.
            </div>
        </section>
    </main>
</div>

<script>
    const inputText = document.getElementById("inputText");
    const translateBtn = document.getElementById("translateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const outputText = document.getElementById("outputText");
    const timeline = document.getElementById("timeline");
    const chips = document.querySelectorAll(".chip");

    function tokenize(text) {
      return text
        .trim()
        .split(/\\s+/)
        .map(word => word.replace(/[^a-zA-Z']/g, ""))
        .filter(Boolean);
    }

    translateBtn.addEventListener("click", () => {
      const value = inputText.value.trim();
      const tokens = tokenize(value);

      if (!value) {
        outputText.textContent = "Please enter a word or sentence.";
        timeline.textContent = "No generated sequence yet.";
        return;
      }

      outputText.textContent = 'Preview generated for: "' + value + '"';

      timeline.innerHTML = "";
      if (tokens.length === 0) {
        timeline.textContent = "No generated sequence yet.";
        return;
      }

      tokens.forEach((token, index) => {
        const el = document.createElement("div");
        el.className = "token";
        el.textContent = (index + 1) + ". " + token;
        timeline.appendChild(el);
      });
    });

    clearBtn.addEventListener("click", () => {
      inputText.value = "";
      outputText.textContent = "Animation preview will appear here later.";
      timeline.textContent = "No generated sequence yet.";
    });
    chips.forEach(chip => {
      chip.addEventListener("click", () => {
        inputText.value = chip.dataset.example;
      });
    });
</script>
</body>
</html>
