<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALAsKA – Recognizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: Georgia, 'Times New Roman', serif;
          background: #fff;
          color: #111;
          min-height: 100vh;
          -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

        header { margin-bottom: 40px; }
        h1 { font-size: 24px; font-weight: normal; margin-bottom: 16px; }

        nav { margin-bottom: 48px; }
        nav a {
          font-size: 14px;
          color: #111;
          text-decoration: none;
          margin-right: 20px;
          padding-bottom: 2px;
        }
        nav a:hover { border-bottom: 1px solid #111; }
        nav a.active { border-bottom: 1px solid #111; }

        h2 { font-size: 14px; font-weight: normal; color: #666; margin-bottom: 12px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

        .drop-zone {
          width: 100%;
          aspect-ratio: 1 / 1;
          border: 1px solid #ddd;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition: border-color 0.2s;
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color: #111; }

        .drop-zone img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: contain;
        }

        .drop-hint { color: #999; text-align: center; font-size: 14px; padding: 20px; font-style: italic; }

        #fileInput { display: none; }

        button {
          border: 1px solid #111;
          cursor: pointer;
          font: inherit;
          font-size: 13px;
          padding: 7px 16px;
          background: #fff;
          color: #111;
          margin-right: 6px;
        }
        button:hover { background: #111; color: #fff; }

        .controls { margin-top: 12px; }

        .result-area { display: flex; flex-direction: column; justify-content: center; }

        .result-box {
          padding: 24px 0;
          border-top: 1px solid #ddd;
          border-bottom: 1px solid #ddd;
          text-align: center;
          min-height: 120px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        .big-letter { font-size: 72px; font-weight: normal; line-height: 1; }
        .confidence-text { color: #666; font-size: 13px; margin-top: 4px; }
        .placeholder-text { color: #999; font-size: 14px; font-style: italic; }

        .top5 { display: flex; flex-direction: column; gap: 6px; margin-top: 20px; }
        .top5-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }

        .bar-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .bar-letter { width: 16px; text-align: center; }
        .bar-track { flex: 1; height: 6px; background: #eee; overflow: hidden; }
        .bar-fill { height: 100%; background: #111; transition: width 0.5s ease; }
        .bar-pct { width: 36px; text-align: right; color: #666; font-size: 12px; }

        .loading-spinner {
          display: none;
          width: 24px;
          height: 24px;
          border: 2px solid #ddd;
          border-top-color: #111;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
          display: none;
          color: #111;
          font-size: 13px;
          margin-top: 12px;
          padding: 8px 0;
          border-top: 1px solid #ddd;
        }

        @media (max-width: 600px) {
          .grid { grid-template-columns: 1fr; }
          .page { padding: 32px 16px 60px; }
          h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="page">
    <header>
        <h1>ALAsKA Sign Language</h1>
    </header>

    <nav>
        <a href="/">Translator</a>
        <a href="/quiz">Quiz</a>
        <a href="/recognize" class="active">Recognizer</a>
        <a href="/video">Video</a>
    </nav>

    <main class="grid">
        <section>
            <h2>Upload a hand sign</h2>

            <div class="drop-zone" id="dropZone">
                <div class="drop-hint" id="dropHint">Drop an image here or click to choose</div>
            </div>

            <input type="file" id="fileInput" accept="image/*" />

            <div class="controls">
                <button id="analyzeBtn" disabled>Analyze</button>
                <button id="clearBtn">Clear</button>
            </div>

            <div class="error-box" id="errorBox"></div>
        </section>

        <section class="result-area">
            <h2>Prediction</h2>

            <div class="result-box">
                <div class="loading-spinner" id="spinner"></div>
                <div id="resultContent">
                    <div class="placeholder-text">Upload an image and click Analyze.</div>
                </div>
            </div>

            <div class="top5" id="top5Container" style="display:none;">
                <div class="top5-label">Top 5</div>
            </div>
        </section>
    </main>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const dropHint = document.getElementById('dropHint');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultContent = document.getElementById('resultContent');
    const spinner = document.getElementById('spinner');
    const top5Container = document.getElementById('top5Container');
    const errorBox = document.getElementById('errorBox');

    let selectedFile = null, previewImg = null;

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    function setFile(file) {
        selectedFile = file;
        errorBox.style.display = 'none';
        if (previewImg) previewImg.remove();
        dropHint.style.display = 'none';
        previewImg = document.createElement('img');
        previewImg.src = URL.createObjectURL(file);
        dropZone.appendChild(previewImg);
        analyzeBtn.disabled = false;
        resetResult();
    }

    clearBtn.addEventListener('click', () => {
        selectedFile = null; fileInput.value = '';
        if (previewImg) { previewImg.remove(); previewImg = null; }
        dropHint.style.display = 'block';
        analyzeBtn.disabled = true;
        errorBox.style.display = 'none';
        resetResult();
    });

    function resetResult() {
        resultContent.innerHTML = '<div class="placeholder-text">Upload an image and click Analyze.</div>';
        top5Container.style.display = 'none';
        top5Container.innerHTML = '<div class="top5-label">Top 5</div>';
    }

    analyzeBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        resultContent.innerHTML = '';
        spinner.style.display = 'block';
        top5Container.style.display = 'none';
        analyzeBtn.disabled = true;
        errorBox.style.display = 'none';

        const formData = new FormData();
        formData.append('image', selectedFile);

        try {
            const res = await fetch('/predict', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            spinner.style.display = 'none';
            const pct = Math.round(data.confidence * 100);
            resultContent.innerHTML = '<div class="big-letter">' + data.prediction + '</div><div class="confidence-text">' + pct + '% confident</div>';

            top5Container.style.display = 'flex';
            data.top5.forEach(item => {
                const row = document.createElement('div');
                row.className = 'bar-row';
                const barPct = Math.round(item.confidence * 100);
                row.innerHTML = '<div class="bar-letter">' + item.letter + '</div><div class="bar-track"><div class="bar-fill" style="width:' + barPct + '%"></div></div><div class="bar-pct">' + barPct + '%</div>';
                top5Container.appendChild(row);
            });
        } catch (err) {
            spinner.style.display = 'none';
            resetResult();
            errorBox.textContent = err.message || 'Something went wrong.';
            errorBox.style.display = 'block';
        }
        analyzeBtn.disabled = false;
    });
</script>
</body>
</html>
