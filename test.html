<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALAsKA – Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: Georgia, 'Times New Roman', serif;
          background: #fff;
          color: #111;
          min-height: 100vh;
          -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

        header { margin-bottom: 40px; }
        h1 { font-size: 24px; font-weight: normal; margin-bottom: 16px; }

        nav { margin-bottom: 32px; }
        nav a {
          font-size: 14px;
          color: #111;
          text-decoration: none;
          margin-right: 20px;
          padding-bottom: 2px;
        }
        nav a:hover { border-bottom: 1px solid #111; }
        nav a.active { border-bottom: 1px solid #111; }

        h2 { font-size: 14px; font-weight: normal; color: #666; margin-bottom: 12px; }

        /* SCORE */
        .score-row { display: flex; gap: 24px; margin-bottom: 12px; font-size: 13px; }
        .score-item { text-align: center; }
        .score-item .val { font-size: 20px; }
        .score-item .lbl { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }

        .progress-track { height: 2px; background: #eee; margin-bottom: 32px; }
        .progress-fill { height: 100%; background: #111; transition: width 0.4s ease; width: 0%; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

        /* IMAGE */
        .image-card {
          width: 100%;
          aspect-ratio: 1 / 1;
          border: 1px solid #ddd;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        .image-card img { width: 100%; height: 100%; object-fit: contain; }
        .img-placeholder { color: #999; font-size: 14px; text-align: center; padding: 20px; font-style: italic; }

        /* INPUT */
        .input-row { display: flex; gap: 8px; margin-top: 12px; }

        .letter-input {
          flex: 1;
          border: 1px solid #ddd;
          padding: 8px 12px;
          font: inherit;
          font-size: 18px;
          color: #111;
          background: #fff;
          outline: none;
          text-transform: uppercase;
          text-align: center;
          letter-spacing: 0.1em;
        }
        .letter-input:focus { border-color: #111; }
        .letter-input.correct-input { border-color: #111; background: #f0f0f0; }
        .letter-input.wrong-input { border-color: #111; background: #f0f0f0; }

        /* BUTTONS */
        button {
          border: 1px solid #111;
          cursor: pointer;
          font: inherit;
          font-size: 13px;
          padding: 7px 16px;
          background: #fff;
          color: #111;
        }
        button:hover { background: #111; color: #fff; }

        /* FEEDBACK */
        .feedback {
          padding: 10px 0;
          margin-top: 12px;
          display: none;
          align-items: center;
          gap: 8px;
          font-size: 14px;
          border-top: 1px solid #ddd;
        }
        .feedback.show { display: flex; }
        .feedback-icon { font-size: 16px; }
        .feedback-body strong { display: block; margin-bottom: 2px; }

        .next-row { margin-top: 10px; display: none; }
        .next-row.show { display: flex; gap: 8px; }

        /* KEYBOARD */
        .keyboard { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; }
        .key {
          width: 30px;
          height: 30px;
          border: 1px solid #ddd;
          background: #fff;
          color: #111;
          font-size: 12px;
          font-family: inherit;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0;
        }
        .key:hover { border-color: #111; }
        .key.used-correct { background: #111; color: #fff; border-color: #111; }
        .key.used-wrong { background: #eee; color: #999; border-color: #ddd; }

        /* HISTORY */
        .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 2px; }
        .history-list::-webkit-scrollbar-thumb { background: #ddd; }

        .history-item {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 4px 0;
          border-bottom: 1px solid #f0f0f0;
          font-size: 13px;
        }
        .h-letter { font-size: 15px; width: 20px; text-align: center; }
        .h-answer { color: #666; flex: 1; }
        .h-result { font-size: 13px; }
        .empty-history { color: #999; font-size: 13px; text-align: center; padding: 24px 0; font-style: italic; }

        /* FINISH */
        .finish-screen {
          display: none;
          flex-direction: column;
          align-items: center;
          text-align: center;
          padding: 24px 0;
          gap: 8px;
        }
        .finish-screen.show { display: flex; }
        .finish-screen h3 { font-size: 18px; font-weight: normal; }
        .finish-screen p { color: #666; font-size: 14px; }

        @media (max-width: 600px) {
          .grid { grid-template-columns: 1fr; }
          .page { padding: 32px 16px 60px; }
          h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="page">
    <header>
        <h1>ALAsKA Sign Language</h1>
    </header>

    <nav>
        <a href="/">Translator</a>
        <a href="/quiz" class="active">Quiz</a>
        <a href="/recognize">Recognizer</a>
        <a href="/video">Video</a>
    </nav>

    <div class="score-row">
        <div class="score-item"><div class="val" id="scoreCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="score-item"><div class="val" id="scoreWrong">0</div><div class="lbl">Wrong</div></div>
        <div class="score-item"><div class="val" id="scoreTotal">0</div><div class="lbl">Attempted</div></div>
        <div class="score-item"><div class="val" id="scoreAccuracy">-</div><div class="lbl">Accuracy</div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <main class="grid">
        <section>
            <h2>What letter is this?</h2>

            <div class="image-card">
                <div class="img-placeholder" id="imgPlaceholder">Press Start Quiz to begin.</div>
                <img id="aslImage" src="" alt="ASL letter" style="display:none;" />
            </div>

            <div class="input-row" id="inputRow" style="display:none;">
                <input type="text" class="letter-input" id="letterInput" maxlength="1" placeholder="?" autocomplete="off" autocorrect="off" spellcheck="false" />
                <button id="submitBtn">Submit</button>
            </div>

            <div class="feedback" id="feedbackBox">
                <span class="feedback-icon" id="feedbackIcon"></span>
                <div class="feedback-body">
                    <strong id="feedbackTitle"></strong>
                    <span id="feedbackMsg"></span>
                </div>
            </div>

            <div class="next-row" id="nextRow">
                <button id="nextBtn">Next</button>
                <button id="skipBtn">Skip</button>
            </div>

            <div style="margin-top:12px;" id="startRow">
                <button id="startBtn">Start Quiz</button>
            </div>
        </section>

        <section>
            <h2>History</h2>

            <div class="keyboard" id="keyboard"></div>

            <div class="history-list" id="historyList">
                <div class="empty-history">No answers yet.</div>
            </div>

            <div class="finish-screen" id="finishScreen">
                <h3>Quiz Complete</h3>
                <p id="finishMsg"></p>
                <button id="restartBtn" style="margin-top:6px;">Play Again</button>
            </div>
        </section>
    </main>
</div>

<script>
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const IMAGE_PATH = 'asl_alphabet_test/';
    const TOTAL_ROUNDS = 26;

    let queue = [], currentLetter = '', answered = false;
    let stats = { correct: 0, wrong: 0, total: 0 };
    let history = [], quizRunning = false;

    const aslImage = document.getElementById('aslImage');
    const imgPlaceholder = document.getElementById('imgPlaceholder');
    const letterInput = document.getElementById('letterInput');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const skipBtn = document.getElementById('skipBtn');
    const startBtn = document.getElementById('startBtn');
    const startRow = document.getElementById('startRow');
    const inputRow = document.getElementById('inputRow');
    const nextRow = document.getElementById('nextRow');
    const feedbackBox = document.getElementById('feedbackBox');
    const feedbackIcon = document.getElementById('feedbackIcon');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const historyList = document.getElementById('historyList');
    const finishScreen = document.getElementById('finishScreen');
    const finishMsg = document.getElementById('finishMsg');
    const restartBtn = document.getElementById('restartBtn');
    const progressFill = document.getElementById('progressFill');
    const keyboard = document.getElementById('keyboard');

    function buildKeyboard() {
        keyboard.innerHTML = '';
        LETTERS.forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.textContent = l;
            btn.dataset.letter = l;
            btn.addEventListener('click', () => {
                if (!quizRunning || answered) return;
                letterInput.value = l;
                letterInput.focus();
            });
            keyboard.appendChild(btn);
        });
    }

    function markKey(letter, isCorrect) {
        const btn = keyboard.querySelector('[data-letter="' + letter + '"]');
        if (btn) { btn.classList.remove('used-correct','used-wrong'); btn.classList.add(isCorrect ? 'used-correct' : 'used-wrong'); }
    }

    function resetKeys() { keyboard.querySelectorAll('.key').forEach(k => k.classList.remove('used-correct','used-wrong')); }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
        return a;
    }

    function startQuiz() {
        quizRunning = true;
        stats = { correct: 0, wrong: 0, total: 0 };
        history = [];
        queue = shuffle(LETTERS);
        answered = false;
        updateScoreboard(); resetKeys(); renderHistory();
        finishScreen.classList.remove('show');
        startRow.style.display = 'none';
        inputRow.style.display = 'flex';
        loadNextLetter();
    }

    function loadNextLetter() {
        if (queue.length === 0) { endQuiz(); return; }
        currentLetter = queue.pop();
        answered = false;
        letterInput.value = '';
        letterInput.className = 'letter-input';
        letterInput.disabled = false;
        submitBtn.disabled = false;
        feedbackBox.className = 'feedback';
        nextRow.className = 'next-row';
        imgPlaceholder.style.display = 'none';
        aslImage.style.display = 'block';
        aslImage.src = IMAGE_PATH + currentLetter + '_test.jpg';
        progressFill.style.width = ((TOTAL_ROUNDS - queue.length - 1) / TOTAL_ROUNDS * 100) + '%';
        letterInput.focus();
    }

    function submitAnswer() {
        if (answered || !quizRunning) return;
        const guess = letterInput.value.trim().toUpperCase();
        if (!guess || !/^[A-Z]$/.test(guess)) { letterInput.focus(); return; }
        answered = true; stats.total++;
        letterInput.disabled = true; submitBtn.disabled = true;
        const isCorrect = guess === currentLetter;

        if (isCorrect) {
            stats.correct++;
            letterInput.classList.add('correct-input');
            feedbackBox.className = 'feedback show';
            feedbackIcon.textContent = '\u2713';
            feedbackTitle.textContent = 'Correct';
            feedbackMsg.textContent = "That's the letter " + currentLetter + ".";
        } else {
            stats.wrong++;
            letterInput.classList.add('wrong-input');
            feedbackBox.className = 'feedback show';
            feedbackIcon.textContent = 'X';
            feedbackTitle.textContent = 'Incorrect';
            feedbackMsg.textContent = 'You guessed ' + guess + ', but this is ' + currentLetter + '.';
        }

        markKey(guess, isCorrect);
        history.unshift({ letter: currentLetter, guess, correct: isCorrect });
        updateScoreboard(); renderHistory();
        nextRow.className = 'next-row show';
        progressFill.style.width = (stats.total / TOTAL_ROUNDS * 100) + '%';
    }

    function endQuiz() {
        quizRunning = false;
        inputRow.style.display = 'none';
        nextRow.className = 'next-row';
        feedbackBox.className = 'feedback';
        aslImage.style.display = 'none';
        imgPlaceholder.style.display = 'block';
        imgPlaceholder.textContent = 'Quiz finished.';
        progressFill.style.width = '100%';
        const pct = Math.round(stats.correct / stats.total * 100);
        finishMsg.textContent = stats.correct + '/' + stats.total + ' correct (' + pct + '%).';
        finishScreen.classList.add('show');
    }

    function updateScoreboard() {
        document.getElementById('scoreCorrect').textContent = stats.correct;
        document.getElementById('scoreWrong').textContent = stats.wrong;
        document.getElementById('scoreTotal').textContent = stats.total;
        document.getElementById('scoreAccuracy').textContent = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '-';
    }

    function renderHistory() {
        if (history.length === 0) { historyList.innerHTML = '<div class="empty-history">No answers yet.</div>'; return; }
        historyList.innerHTML = history.map(function(h) {
            return '<div class="history-item"><div class="h-letter">' + h.letter + '</div><div class="h-answer">Guessed: <strong>' + h.guess + '</strong></div><div class="h-result">' + (h.correct ? '\u2713' : 'X') + '</div></div>';
        }).join('');
    }

    startBtn.addEventListener('click', startQuiz);
    restartBtn.addEventListener('click', function() { finishScreen.classList.remove('show'); startQuiz(); });
    submitBtn.addEventListener('click', submitAnswer);
    letterInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { answered ? loadNextLetter() : submitAnswer(); } });
    nextBtn.addEventListener('click', loadNextLetter);
    skipBtn.addEventListener('click', function() {
        if (!answered) {
            stats.total++; stats.wrong++;
            history.unshift({ letter: currentLetter, guess: '-', correct: false });
            answered = true;
            updateScoreboard(); renderHistory();
            progressFill.style.width = (stats.total / TOTAL_ROUNDS * 100) + '%';
        }
        loadNextLetter();
    });

    buildKeyboard();
    updateScoreboard();
</script>
</body>
</html>
